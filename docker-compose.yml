# 默认部署：使用 GHCR 上的预构建镜像
# 镜像由 .github/workflows/docker-publish.yml 在打 tag 时自动发布。
# 如果你 fork 后想用自己的镜像，把 image 改成 ghcr.io/<your-username>/chatgpt2api:latest 即可。
# 如果你要在本地修改代码后构建，改用 docker-compose.local.yml。
services:
  app:
    image: ghcr.io/botesu/chatgpt2api:latest
    container_name: chatgpt2api
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      # 存储后端配置 (可选值: json, sqlite, postgres, git)
      STORAGE_BACKEND: json

      # 数据库配置 (当 STORAGE_BACKEND=sqlite/postgres 时使用)
      # DATABASE_URL: postgresql://user:password@host:5432/dbname
      # DATABASE_URL: sqlite:////app/data/accounts.db

      # Git 仓库配置 (当 STORAGE_BACKEND=git 时使用)
      # GIT_REPO_URL: https://github.com/user/repo.git
      # GIT_TOKEN: ghp_xxxxxxxxxxxx
      # GIT_BRANCH: main
      # GIT_FILE_PATH: accounts.json

      # 认证密钥 (可选，覆盖 config.json)
      # CHATGPT2API_AUTH_KEY: your_secret_key

      # 基础 URL (可选)
      # CHATGPT2API_BASE_URL: https://your-domain.com

      # SMS 接码平台 base URL (可选，覆盖注册机配置)
      # SMS_PROVIDER_BASE_URL: https://your-sms-provider.example.com/api/v1
